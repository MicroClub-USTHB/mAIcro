services:
  maicro:
    build:
      context: .
      target: builder
    container_name: maicro_dev
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_RELOAD=true
      - PYTHONPATH=/app/src
    env_file:
      - .env
    volumes:
      - ./src:/app/src 
      - ./tests:/app/tests  
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - /app/.venv
    ports:
      - "8000:8000"
    command: >
      /app/.venv/bin/uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    depends_on:
      - qdrant
    networks:
      - maicro-network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.2.0
    container_name: qdrant_dev
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-devkey}"
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - maicro-network
    healthcheck:
      disable: true

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_dev
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - maicro-network
    depends_on:
      - maicro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - maicro-network
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  maicro-network:
    driver: bridge
