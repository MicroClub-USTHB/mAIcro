services:
  maicro:
    build:
      context: .
      target: builder
    container_name: maicro_dev
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_RELOAD=true
      - PYTHONPATH=/app/src
    env_file:
      - .env
    volumes:
      - ./src:/app/src # bind-mount source for hot reload
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - /app/.venv # keep venv persistent inside container
    ports:
      - "8000:8000"
    command: >
      /app/.venv/bin/uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    depends_on:
      - qdrant
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.2.0
    container_name: qdrant_dev
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-devkey}"
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      disable: true

volumes:
  qdrant_data:
