services:
  maicro:
    image: ghcr.io/microclub-usthb/maicro:latest
    # build: . # Uncomment to build from local source
    container_name: maicro
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
