services:
  maicro:
    image: ${MAICRO_IMAGE:-ghcr.io/microclub-usthb/maicro:latest}

    # If you want to build from the local source instead, uncomment the following build key
    # build: .

    container_name: maicro
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - maicro-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request as u; u.urlopen("http://localhost:8000/api/v1/health")'' || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - maicro
    restart: unless-stopped
    networks:
      - maicro-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - maicro-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  maicro-network:
    driver: bridge
